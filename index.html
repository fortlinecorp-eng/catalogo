<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Fortline</title>

    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <div class="container">

<aside class="sidebar">

    <div class="logo-sidebar">

        <img
            src="imagens/logo_fortline_white.png"
            alt="Fortline"
        >

    </div>

    <h3>Linhas</h3>

    <ul id="lista-linhas"></ul>

</aside>


        <main class="conteudo">

            <header class="topbar">

                <h1>Catálogo Comercial</h1>

                <div class="acoes-topo">
                    

    <button id="btn-novidades" class="btn-novidades">

        🔔 Novidades

        <span id="contadorNovidades"></span>

    </button>

</div>

                <input 
                    type="text" 
                    id="busca" 
                    placeholder="Buscar em todo catálogo..."
                >

            </header>
        
            <section id="detalhes-linha" class="detalhes-linha">

            <div class="header-linha">

            <h2>Selecione uma linha</h2>

            </div>

            </section>

            <section class="tabela-area" id="tabela-area">
              
                <div id="lista-produtos" class="lista-produtos">

                </div>

            </section>

        </main>

    </div>

    <div id="modal-produto" class="modal">

        <div class="modal-conteudo">

            <span id="fechar-modal">&times;</span>

            <h2>Detalhes do Produto</h2>

            <div id="detalhes-produto"></div>

        </div>

    </div>

    <div id="painel-novidades" class="painel-novidades">

    <div class="cabecalho-novidades">
        <h2>Novidades</h2>
    </div>

    <div id="lista-novidades"></div>

</div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>

<div id="area-impressao"></div>

</body>
</html>
